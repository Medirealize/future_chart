      <stop offset="0%" stop-color="#4c3c27" />
      <stop offset="48%" stop-color="#2f261a" />
      <stop offset="100%" stop-color="#1f1912" />
    </linearGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#f7e9c9" />
      <stop offset="100%" stop-color="#b39666" />
    </linearGradient>
    <linearGradient id="lineCore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff3c4" />
      <stop offset="55%" stop-color="#f8d57b" />
      <stop offset="100%" stop-color="#c99834" />
    </linearGradient>
    <radialGradient id="auraGrad" cx="58%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#d7a74a" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#d7a74a" stop-opacity="0" />
